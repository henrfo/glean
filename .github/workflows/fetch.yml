name: fetch

# Daily pipeline: pull new literature around your seeds, re-score, commit the
# updated corpus, and redeploy the static site to GitHub Pages.
on:
  schedule:
    - cron: "0 6 * * *"      # 06:00 UTC daily
  workflow_dispatch: {}       # allow manual runs from the Actions tab
  push:
    paths:
      - "data/seeds.yaml"     # re-fetch whenever you change your seeds
      - "site/**"             # redeploy on interface changes

permissions:
  contents: write             # commit refreshed data/*.json
  pages: write                # deploy to Pages
  id-token: write             # Pages OIDC

concurrency:
  group: glean-pipeline
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync

      - name: Fetch literature
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        # Seeds-only for now (--limit 0): resolve every seed title, no citation
        # neighborhood. Raise --limit (with a SEMANTIC_SCHOLAR_API_KEY secret) to
        # pull references/citations and populate the graph edges.
        run: uv run scripts/fetch.py --limit 0

      - name: Score relevance
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: uv run scripts/score.py

      - name: Commit updated corpus
        run: |
          git config user.name  "glean-bot"
          git config user.email "glean-bot@users.noreply.github.com"
          git add data/papers.json data/edges.json
          if git diff --cached --quiet; then
            echo "No corpus changes."
          else
            git commit -m "chore(data): daily fetch + score [skip ci]"
            git push
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4        # pull the freshly committed data

      - name: Bundle data into the site
        run: |
          mkdir -p site/data
          cp data/*.json site/data/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
