<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>glean</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="header-row">
      <div class="brand"><span class="logo">glean</span><span class="tagline">papers in · positions out</span></div>
      <nav class="header-right">
        <a class="meta-link" href="https://github.com/henrfo/glean" target="_blank" rel="noopener">repo</a>
        <button class="linkbtn" id="connect-toggle">connect</button>
      </nav>
    </div>

    <div class="token-area" id="token-area" hidden>
      <input id="token-input" type="password" placeholder="github_pat_… (Contents: read & write)" autocomplete="off" />
      <button class="linkbtn" id="token-save">save</button>
      <a class="meta-link" href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener">create token ↗</a>
      <span class="token-status" id="token-status"></span>
    </div>

    <div class="controls">
      <form class="add-box" id="add-box">
        <input id="add-input" placeholder="add a paper — title or DOI" autocomplete="off" />
      </form>
      <input class="search" id="search" placeholder="filter" autocomplete="off" />
    </div>

    <ul class="legend">
      <li><span class="dot dot-external"></span>9–10 · core</li>
      <li><span class="dot dot-active"></span>7–8 · high</li>
      <li><span class="dot dot-quiet"></span>4–6 · moderate</li>
      <li><span class="dot dot-inactive"></span>0–3 · low</li>
      <li><span class="dot dot-unknown"></span>unrated</li>
    </ul>
  </header>

  <section class="threads" id="threads" hidden>
    <button class="threads-toggle" id="threads-toggle" aria-expanded="false">
      <span class="tw" id="threads-caret">▸</span> Threads <span class="threads-count" id="threads-count"></span>
    </button>
    <div class="threads-body" id="threads-body" hidden></div>
  </section>

  <table class="paper-table">
    <thead>
      <tr>
        <th class="col-rating sortable" data-sort="rating" title="Sort by rating">●</th>
        <th class="sortable" data-sort="title">Title</th>
        <th class="sortable" data-sort="authors">Authors</th>
        <th class="col-year sortable" data-sort="year">Year</th>
        <th class="col-thread">Thread</th>
        <th class="col-seen sortable" data-sort="seen">Seen</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <div class="meta" id="meta">loading…</div>
  <div class="toast" id="toast" hidden></div>

  <script src="js/app.js"></script>
  <script src="js/gh.js"></script>
  <script src="js/add.js"></script>
</body>
</html>
